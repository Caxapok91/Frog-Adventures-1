<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐸 Лягушонок против кузнечиков 🦗</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a6b2f 0%, #0a3a18 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 8px;
            touch-action: pan-x pan-y;
            overflow: hidden;
        }

        /* Главный контейнер игры — гибкая сетка */
        .game-container {
            width: 100%;
            max-width: 1400px;
            background: #2e6b2a;
            border-radius: 48px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 1px 5px rgba(255,255,180,0.4);
            padding: 12px 20px 16px 20px;
            transition: all 0.1s ease;
        }

        /* Верхняя панель информационная */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 4px 12px;
            gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .score-card, .best-card {
            background: #2c2817;
            padding: 5px 20px;
            border-radius: 50px;
            color: #fef3c7;
            text-shadow: 2px 2px 0 #41371a;
            font-weight: bold;
            font-size: 1.3rem;
            display: flex;
            gap: 10px;
            align-items: baseline;
            box-shadow: inset 0 1px 3px #aa9f6e, 0 5px 0 #161305;
        }

        .score-card span:first-child, .best-card span:first-child {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .restart-btn {
            background: #e6b86e;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.95rem;
            padding: 5px 22px;
            border-radius: 40px;
            color: #2f2a0f;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 5px 0 #8b5a2b;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b5a2b;
        }

        .below-buttons {
            margin-top: 6px;
            margin-bottom: 2px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .below-btn {
            background: rgba(29, 71, 25, 0.85);
            border: none;
            font-family: inherit;
            font-weight: 900;
            font-size: 0.95rem;
            padding: 8px 28px;
            border-radius: 999px;
            color: #e9ffcf;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.14);
            transition: transform 0.04s linear;
            min-width: 130px;
        }

        .below-btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.14);
        }

        /* ГЛАВНЫЙ БЛОК: canvas + левая и правая кнопки (только в ландшафте) */
        .playground-row {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            justify-content: center;
            gap: 12px;
            margin: 10px 0;
        }

        /* Боковые контейнеры для кнопок в ландшафте (по умолчанию скрыты) */
        .landscape-side-control {
            display: none;
            flex: 0 0 auto;
            align-items: center;
            justify-content: center;
        }

        .side-move-panel {
            background: rgba(29, 71, 25, 0.65);
            border-radius: 68px;
            padding: 20px 12px;
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            gap: 28px;
            box-shadow: 0 8px 12px rgba(0,0,0,0.3);
        }

        .side-move-btn {
            width: 70px;
            height: 70px;
            border-radius: 45px;
            font-size: 2.4rem;
            background: #2c2817e6;
            border: none;
            color: #ffe0a3;
            text-shadow: 2px 2px 0 #41371a;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4);
            transition: transform 0.04s linear;
            cursor: pointer;
            touch-action: manipulation;
            font-weight: bold;
        }

        .side-move-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.4);
        }

        .side-jump-btn {
            background: #e6b86eed;
            width: 70px;
            height: 70px;
            border-radius: 45px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #2f2a0f;
            border: none;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4);
            transition: transform 0.04s linear;
            cursor: pointer;
        }

        .side-jump-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.4);
        }

        .play-area {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1 1 auto;
        }

        canvas {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 65vh;
            border-radius: 28px;
            box-shadow: 0 10px 18px rgba(0,0,0,0.4);
            cursor: pointer;
            background: #8ec07c;
            outline: none;
            touch-action: none;
        }

        /* Мобильные нижние контролы (по умолчанию показываются в портрете) */
        .mobile-controls {
            margin: 8px 16px 2px 16px;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            background: rgba(29, 71, 25, 0.55);
            border-radius: 60px;
            flex-shrink: 0;
        }

        .move-pad {
            display: flex;
            gap: 14px;
        }

        .move-btn, .jump-btn {
            border: none;
            font-family: inherit;
            font-weight: 900;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 6px 0 rgba(0,0,0,0.35);
            transition: transform 0.04s linear;
        }

        .move-btn:active, .jump-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 rgba(0,0,0,0.35);
        }

        .move-btn {
            width: 72px;
            height: 60px;
            border-radius: 24px;
            font-size: 1.7rem;
            background: rgba(44, 40, 23, 0.88);
            color: #ffe0a3;
            text-shadow: 2px 2px 0 #41371a;
        }

        .jump-btn {
            width: 150px;
            height: 60px;
            border-radius: 30px;
            font-size: 1.05rem;
            background: rgba(230, 184, 110, 0.95);
            color: #2f2a0f;
            font-weight: bold;
        }

        /* ========== ЛАНДШАФТНАЯ ОРИЕНТАЦИЯ: боковые кнопки слева/справа ========== */
        @media (orientation: landscape) {
            .game-container {
                padding: 12px 20px;
                width: 98vw;
            }
            
            .playground-row {
                display: flex;
                flex-direction: row;
                gap: 18px;
                align-items: center;
                justify-content: center;
            }
            
            /* Показываем боковые контроллеры */
            .landscape-side-control {
                display: flex;
            }
            
            /* Скрываем нижнюю панель с кнопками */
            .mobile-controls {
                display: none;
            }
            
            .play-area {
                flex: 1 1 auto;
                min-width: 0;
            }
            
            canvas {
                max-height: 70vh;
                width: 100%;
                height: auto;
                object-fit: contain;
            }
            
            .info-panel {
                margin: 4px 8px;
            }
            
            .score-card, .best-card {
                padding: 4px 18px;
                font-size: 1.2rem;
            }
            
            .restart-btn {
                padding: 4px 20px;
            }
            
            .below-btn {
                padding: 6px 24px;
            }
            
            /* Адаптация для очень широких экранов уменьшаем размер боковых кнопок */
            .side-move-btn {
                width: 65px;
                height: 65px;
                font-size: 2.2rem;
            }
            .side-jump-btn {
                width: 65px;
                height: 65px;
                font-size: 1.5rem;
            }
        }
        
        /* Для узких ландшафтных экранов (например, высота малая) */
        @media (orientation: landscape) and (max-height: 550px) {
            .side-move-btn {
                width: 55px;
                height: 55px;
                font-size: 12px;
            }
            .side-jump-btn {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }
            .side-move-panel {
                padding: 12px 8px;
                gap: 20px;
            }
            canvas {
                max-height: 58vh;
            }
            .score-card, .best-card {
                font-size: 1rem;
                padding: 2px 12px;
            }
        }
        
        /* Экстремально компактные экраны */
        @media (orientation: landscape) and (max-height: 420px) {
            .side-move-btn {
                width: 48px;
                height: 48px;
                font-size: 12px;
            }
            .side-jump-btn {
                width: 48px;
                height: 48px;
                font-size:12px;
            }
            .side-move-panel {
                padding: 8px 6px;
                gap: 16px;
            }
            canvas {
                max-height: 50vh;
            }
        }
        
        /* Портретная ориентация: классический вид + боковые панели не мешают */
        @media (orientation: portrait) {
            .landscape-side-control {
                display: none;
            }
            .mobile-controls {
                display: flex;
            }
            .playground-row {
                display: block;
            }
            .play-area {
                margin: 8px 0;
            }
            canvas {
                width: 100%;
                max-height: 58vh;
            }
            .info-panel {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .restart-btn {
                grid-column: 1 / -1;
                justify-self: center;
                padding: 5px 18px;
            }
        }
        
        /* Планшеты в портрете */
        @media (max-width: 750px) and (orientation: portrait) {
            .score-card, .best-card {
                font-size: 1rem;
                padding: 4px 12px;
            }
            .move-btn {
                width: 65px;
                height: 55px;
            }
            .jump-btn {
                width: 130px;
                height: 55px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="info-panel">
        <div class="score-card">🐸 СЧЁТ: <span id="scoreValue">0</span></div>
        <div class="score-card">⏱️ ВРЕМЯ: <span id="timeValue">0.0с</span></div>
        <button class="restart-btn" id="restartButton">🌿 НОВАЯ ИГРА</button>
        <div class="best-card">🏆 РЕКОРД: <span id="bestValue">—</span></div>
    </div>
    <div class="below-buttons">
        <button class="below-btn" id="pauseButton" type="button">⏸️ ПАУЗА</button>
    </div>

    <!-- Новая сетка: слева контроллеры (ландшафт), посередине canvas, справа контроллеры (ландшафт) -->
    <div class="playground-row">
        <!-- Левая боковая панель управления (влево + прыжок) -->
        <div class="landscape-side-control" id="leftSideControls">
            <div class="side-move-panel">
                <button class="side-move-btn" id="sideBtnLeft" type="button">◀</button>
                <button class="side-jump-btn" id="sideBtnJumpLeft" type="button">🐸<br>ПРЫГ</button>
            </div>
        </div>

        <div class="play-area">
            <canvas id="gameCanvas" width="900" height="500" tabindex="0"></canvas>
        </div>

        <!-- Правая боковая панель управления (вправо + дублирующий прыжок для удобства) -->
        <div class="landscape-side-control" id="rightSideControls">
            <div class="side-move-panel">
                <button class="side-move-btn" id="sideBtnRight" type="button">▶</button>
                <button class="side-jump-btn" id="sideBtnJumpRight" type="button">🐸<br>ПРЫГ</button>
            </div>
        </div>
    </div>

    <!-- Мобильные контролы для портрета -->
    <div class="mobile-controls" aria-hidden="false">
        <div class="move-pad" aria-label="Движение">
            <button class="move-btn" id="btnLeft" type="button">◀</button>
            <button class="move-btn" id="btnRight" type="button">▶</button>
        </div>
        <button class="jump-btn" id="btnJump" type="button">ПРЫЖОК</button>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 900, H = 500;
        const GRAVITY = 0.28;
        const JUMP_FORCE = -9.2;
        
        const FROG_W = 42;
        const FROG_H = 42;
        let frog = {
            x: 80,
            y: 0,
            vx: 0,
            vy: 0,
            width: FROG_W,
            height: FROG_H,
            grounded: false,
            facingRight: true
        };
        
        let platforms = [];
        let grasshoppers = [];
        const GRASS_SIZE = 32;
        
        let score = 0;
        let bestTimeMs = null;
        try {
            const saved = localStorage.getItem('frogEmojiBestTimeMs');
            if(saved && !isNaN(parseFloat(saved))) {
                bestTimeMs = parseFloat(saved);
                document.getElementById('bestValue').innerText = (bestTimeMs/1000).toFixed(1) + "с";
            }
        } catch(e) {}
        
        let gameRunning = true;
        let gameWon = false;
        let startTimeMs = 0;
        let elapsedTimeMs = 0;
        let paused = false;
        let pauseStartedMs = null;
        let totalPausedMs = 0;
        
        function formatTimeMs(ms) { return (ms / 1000).toFixed(1) + "с"; }
        function updateUI() {
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('timeValue').innerText = formatTimeMs(elapsedTimeMs);
        }
        
        function saveBestTimeIfNeeded() {
            if(!gameWon) return;
            if(bestTimeMs === null || elapsedTimeMs < bestTimeMs) {
                bestTimeMs = elapsedTimeMs;
                document.getElementById('bestValue').innerText = formatTimeMs(bestTimeMs);
                try { localStorage.setItem('frogEmojiBestTimeMs', String(bestTimeMs)); } catch(e) {}
            }
        }
        
        function buildLevel() {
            platforms = [];
            const groundY = H - 40;
            platforms.push({ x: 0, y: groundY, w: W, h: 40 });
            platforms.push({ x: 70, y: H - 120, w: 90, h: 22 });
            platforms.push({ x: 260, y: H - 175, w: 100, h: 22 });
            platforms.push({ x: 470, y: H - 225, w: 90, h: 22 });
            platforms.push({ x: 650, y: H - 140, w: 80, h: 22 });
            platforms.push({ x: 780, y: H - 210, w: 75, h: 22 });
            platforms.push({ x: 380, y: H - 295, w: 85, h: 20 });
            platforms.push({ x: 140, y: H - 250, w: 75, h: 20 });
            platforms.push({ x: 570, y: H - 345, w: 70, h: 20 });
            platforms.push({ x: 815, y: H - 345, w: 65, h: 20 });
            platforms.push({ x: 30, y: H - 335, w: 60, h: 20 });
            platforms.push({ x: 500, y: H - 400, w: 70, h: 20 });
            platforms.push({ x: 220, y: H - 380, w: 65, h: 20 });
            
            grasshoppers = [];
            function isOverlapPlatform(px, py, sz) {
                for(let p of platforms) {
                    if(px+sz > p.x && px < p.x+p.w && py+sz > p.y && py < p.y+p.h) return true;
                }
                return false;
            }
            
            const candidateSpots = [
                { x: 100, y: H - 155 }, { x: 310, y: H - 207 }, { x: 510, y: H - 255 },
                { x: 680, y: H - 170 }, { x: 810, y: H - 240 }, { x: 420, y: H - 325 },
                { x: 175, y: H - 280 }, { x: 605, y: H - 375 }, { x: 840, y: H - 375 },
                { x: 55, y: H - 365 },  { x: 45, y: H - 72 },    { x: 250, y: H - 85 },
                { x: 460, y: H - 68 },  { x: 710, y: H - 74 },   { x: 870, y: H - 65 },
                { x: 790, y: H - 125 }, { x: 340, y: H - 150 },  { x: 540, y: H - 290 },
                { x: 735, y: H - 310 }, { x: 120, y: H - 410 },  { x: 530, y: H - 435 },
                { x: 250, y: H - 420 }, { x: 845, y: H - 290 }
            ];
            for(let spot of candidateSpots) {
                if(spot.y + GRASS_SIZE-5 <= H-5 && spot.y >= 12 && !isOverlapPlatform(spot.x, spot.y, GRASS_SIZE-6)) {
                    grasshoppers.push({ x: spot.x, y: spot.y, w: GRASS_SIZE, h: GRASS_SIZE, collected: false });
                }
            }
            for(let i=0;i<4;i++) {
                let rx = 25 + Math.random() * (W - GRASS_SIZE - 20);
                let ry = 40 + Math.random() * (H - GRASS_SIZE - 60);
                let ok = !isOverlapPlatform(rx, ry, GRASS_SIZE-6);
                for(let g of grasshoppers) if(Math.hypot(g.x-rx, g.y-ry) < GRASS_SIZE) ok = false;
                if(ok && ry+GRASS_SIZE <= H-8) grasshoppers.push({ x: rx, y: ry, w: GRASS_SIZE, h: GRASS_SIZE, collected: false });
            }
        }
        
        function resetGame() {
            gameRunning = true;
            gameWon = false;
            score = 0;
            startTimeMs = performance.now();
            elapsedTimeMs = 0;
            paused = false;
            if(pauseStartedMs !== null) pauseStartedMs = null;
            totalPausedMs = 0;
            updateUI();
            buildLevel();
            let startPlat = platforms.find(p => p.x <= 80 && p.x+p.w >= 80+FROG_W);
            if(!startPlat) startPlat = platforms[0];
            frog.x = 80;
            frog.y = startPlat.y - FROG_H;
            frog.vx = 0;
            frog.vy = 0;
            frog.grounded = true;
            frog.facingRight = true;
            if(frog.y + FROG_H > H) frog.y = H - FROG_H - 2;
            if(bestTimeMs !== null) document.getElementById('bestValue').innerText = formatTimeMs(bestTimeMs);
            else document.getElementById('bestValue').innerText = "—";
            const pauseBtn = document.getElementById('pauseButton');
            if(pauseBtn) pauseBtn.innerText = "⏸️ ПАУЗА";
        }
        
        function setPaused(nextPaused) {
            if (paused === nextPaused || !gameRunning) return;
            paused = nextPaused;
            const pauseBtn = document.getElementById('pauseButton');
            if (paused) {
                pauseStartedMs = performance.now();
                if (pauseBtn) pauseBtn.innerText = "▶️ ПРОДОЛЖИТЬ";
                for (const k in keys) keys[k] = false;
            } else {
                if (pauseStartedMs !== null) totalPausedMs += (performance.now() - pauseStartedMs);
                pauseStartedMs = null;
                if (pauseBtn) pauseBtn.innerText = "⏸️ ПАУЗА";
            }
        }
        
        const keys = {
            ArrowLeft: false, ArrowRight: false,
            KeyA: false, KeyD: false,
            Space: false, ArrowUp: false, KeyW: false
        };
        
        let jumpConsumed = false;
        
        function handleCollisions() {
            frog.grounded = false;
            frog.x += frog.vx;
            if(frog.x < 0) frog.x = 0;
            if(frog.x + FROG_W > W) frog.x = W - FROG_W;
            for(let plat of platforms) {
                if(frog.x + FROG_W > plat.x && frog.x < plat.x + plat.w &&
                    frog.y + FROG_H > plat.y && frog.y < plat.y + plat.h) {
                    let leftOverlap = (frog.x + FROG_W) - plat.x;
                    let rightOverlap = (plat.x + plat.w) - frog.x;
                    if(leftOverlap < rightOverlap) frog.x = plat.x - FROG_W;
                    else frog.x = plat.x + plat.w;
                }
            }
            frog.vy += GRAVITY;
            frog.y += frog.vy;
            for(let plat of platforms) {
                if(frog.x + FROG_W > plat.x && frog.x < plat.x + plat.w &&
                    frog.y + FROG_H > plat.y && frog.y < plat.y + plat.h) {
                    if(frog.vy >= 0 && (frog.y + FROG_H - frog.vy) <= plat.y + 12) {
                        frog.y = plat.y - FROG_H;
                        frog.vy = 0;
                        frog.grounded = true;
                    }
                    else if(frog.vy < 0 && frog.y - frog.vy >= plat.y + plat.h - 6) {
                        frog.y = plat.y + plat.h;
                        frog.vy = 0;
                    }
                }
            }
            if(frog.y + FROG_H > H) {
                frog.y = H - FROG_H;
                frog.vy = 0;
                frog.grounded = true;
            }
            if(frog.y < 0) { frog.y = 0; if(frog.vy < 0) frog.vy = 0; }
        }
        
        function updateMovement() {
            if(!gameRunning || paused) return;
            let move = 0;
            if(keys.ArrowLeft || keys.KeyA) move = -1;
            if(keys.ArrowRight || keys.KeyD) move = 1;
            frog.vx = move * 4.0;
            if(frog.vx !== 0) frog.facingRight = frog.vx > 0;
        }
        
        function updateJump() {
            if(!gameRunning || paused) return;
            const jumpHeld = (keys.Space || keys.ArrowUp || keys.KeyW);
            if(frog.grounded && jumpHeld && !jumpConsumed) {
                frog.vy = JUMP_FORCE;
                frog.grounded = false;
                jumpConsumed = true;
            }
            if(!jumpHeld) jumpConsumed = false;
        }
        
        function collectGrasshoppers() {
            for(let g of grasshoppers) {
                if(g.collected) continue;
                if(frog.x < g.x + g.w && frog.x + FROG_W > g.x &&
                   frog.y < g.y + g.h && frog.y + FROG_H > g.y) {
                    g.collected = true;
                    score++;
                    updateUI();
                }
            }
        }
        
        function checkWin() {
            if(gameWon || !gameRunning) return;
            const remaining = grasshoppers.filter(g => !g.collected).length;
            if(remaining === 0) {
                gameWon = true;
                gameRunning = false;
                saveBestTimeIfNeeded();
            }
        }
        
        function checkGameOver() {
            if(!gameRunning) return;
            if(frog.y + FROG_H > H + 45 || frog.y < -75) {
                gameRunning = false;
                gameWon = false;
            }
        }
        
        // Отрисовка (стандартная)
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#b0ddff');
            grad.addColorStop(0.6, '#cef0a8');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff6b0';
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(80, 65, 38, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffdd77';
            ctx.beginPath();
            ctx.arc(80, 65, 32, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,250,210,0.9)';
            ctx.beginPath();
            ctx.ellipse(210, 55, 50, 35, 0, 0, Math.PI*2);
            ctx.ellipse(260, 48, 45, 32, 0, 0, Math.PI*2);
            ctx.ellipse(170, 50, 40, 30, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(730, 75, 55, 40, 0, 0, Math.PI*2);
            ctx.ellipse(790, 68, 50, 37, 0, 0, Math.PI*2);
            ctx.fill();
        }
        
        function drawPlatforms() {
            for(let p of platforms) {
                ctx.fillStyle = '#b47c44';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#e0a56a';
                ctx.fillRect(p.x+2, p.y-5, p.w-4, 7);
                ctx.fillStyle = '#6f4f2a';
                ctx.fillRect(p.x, p.y+3, p.w, 5);
                ctx.fillStyle = '#8bb56a';
                ctx.fillRect(p.x, p.y-2, p.w, 4);
                for(let i=0;i<5;i++) ctx.fillRect(p.x+5+i*14, p.y-1, 3, 4);
            }
        }
        
        function drawGrasshoppers() {
            for(let g of grasshoppers) {
                if(g.collected) continue;
                ctx.font = `${GRASS_SIZE+6}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji"`;
                ctx.shadowBlur = 4;
                ctx.fillStyle = "#000";
                ctx.fillText("🦗", g.x+1, g.y+GRASS_SIZE-2);
                ctx.fillStyle = "#fff";
                ctx.fillText("🦗", g.x, g.y+GRASS_SIZE-3);
                ctx.fillStyle = "#f5e65c";
                ctx.fillText("🦗", g.x-1, g.y+GRASS_SIZE-4);
                ctx.fillStyle = "#3a831c";
                ctx.fillText("🦗", g.x-0.5, g.y+GRASS_SIZE-3.5);
                ctx.fillStyle = "#000";
                ctx.fillText("🦗", g.x, g.y+GRASS_SIZE-3);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawFrog() {
            let x = frog.x, y = frog.y;
            ctx.save();
            if(!frog.facingRight) {
                ctx.translate(x + FROG_W/2, y + FROG_H/2);
                ctx.scale(-1, 1);
                ctx.translate(-(x + FROG_W/2), -(y + FROG_H/2));
            }
            ctx.shadowBlur = 8;
            ctx.font = `48px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.fillStyle = "#48c72a";
            ctx.fillText("🐸", x+2, y+FROG_H-7);
            ctx.fillStyle = "#76e642";
            ctx.fillText("🐸", x, y+FROG_H-9);
            ctx.font = `22px "Segoe UI Emoji"`;
            ctx.fillStyle = "#ff8a8a";
            ctx.fillText("❤️", x+6, y+18);
            ctx.fillText("❤️", x+28, y+18);
            ctx.fillStyle = "#fff";
            ctx.fillText("⚪", x+10, y+15);
            ctx.fillText("⚪", x+26, y+15);
            ctx.fillStyle = "#2c2c2c";
            ctx.fillText("●", x+12, y+16);
            ctx.fillText("●", x+28, y+16);
            ctx.shadowBlur = 0;
            ctx.restore();
        }
        
        function drawRemainingCounter() {
            const remaining = grasshoppers.filter(g => !g.collected).length;
            ctx.font = 'bold 32px "Segoe UI Emoji", monospace';
            ctx.fillStyle = '#f9f3b2';
            ctx.shadowBlur = 4;
            ctx.fillText(`🦗 ${remaining}`, W/2-50, 60);
            ctx.shadowBlur = 0;
        }
        
        function drawGameOver() {
            if(!gameRunning) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0,0,W,H);
                ctx.font = 'bold 36px monospace';
                ctx.fillStyle = '#ffe5a3';
                if(gameWon) {
                    ctx.fillText('🎉 Полина Ты победила!', W/2-130, H/2-40);
                    ctx.font = '24px monospace';
                    ctx.fillText('Время: ' + formatTimeMs(elapsedTimeMs), W/2-100, H/2+20);
                } else {
                    ctx.fillText('😭 ПАДЕНИЕ', W/2-130, H/2-40);
                }
                ctx.font = '20px monospace';
                ctx.fillText('"НОВАЯ ИГРА"', W/2-100, H/2+70);
            }
        }
        
        function drawPausedOverlay() {
            if (!gameRunning || !paused) return;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0,0,W,H);
            ctx.font = 'bold 44px monospace';
            ctx.fillStyle = '#ffe5a3';
            ctx.fillText('⏸️ ПАУЗА', W/2-135, H/2);
        }
        
        function update() {
            if(gameRunning && !paused) {
                elapsedTimeMs = performance.now() - startTimeMs - totalPausedMs;
                updateUI();
                updateMovement();
                handleCollisions();
                updateJump();
                collectGrasshoppers();
                checkWin();
                checkGameOver();
            }
        }
        
        function draw() {
            drawBackground();
            drawPlatforms();
            drawGrasshoppers();
            drawFrog();
            drawRemainingCounter();
            drawGameOver();
            drawPausedOverlay();
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function setKey(code, isDown) {
            if (keys.hasOwnProperty(code)) keys[code] = isDown;
        }
        
        function initControls() {
            window.addEventListener('keydown', (e) => {
                const code = e.code;
                if (code === 'ArrowLeft' || code === 'ArrowRight' || code === 'KeyA' || code === 'KeyD' ||
                    code === 'Space' || code === 'ArrowUp' || code === 'KeyW') e.preventDefault();
                if (code === 'KeyP') { e.preventDefault(); if (gameRunning) setPaused(!paused); return; }
                setKey(code, true);
            });
            window.addEventListener('keyup', (e) => { setKey(e.code, false); });
            window.addEventListener('blur', () => { for (let k in keys) keys[k] = false; });
            
            // портретные кнопки
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnJump = document.getElementById('btnJump');
            const bind = (el, onDown, onUp) => {
                if(!el) return;
                el.addEventListener('pointerdown', (e) => { e.preventDefault(); onDown(); });
                el.addEventListener('pointerup', onUp);
                el.addEventListener('pointercancel', onUp);
                el.addEventListener('pointerleave', onUp);
            };
            bind(btnLeft, () => { setKey('ArrowLeft', true); setKey('KeyA', true); }, () => { setKey('ArrowLeft', false); setKey('KeyA', false); });
            bind(btnRight, () => { setKey('ArrowRight', true); setKey('KeyD', true); }, () => { setKey('ArrowRight', false); setKey('KeyD', false); });
            bind(btnJump, () => { setKey('Space', true); setKey('ArrowUp', true); setKey('KeyW', true); }, () => { setKey('Space', false); setKey('ArrowUp', false); setKey('KeyW', false); });
            
            // боковые ландшафтные кнопки
            const sideLeft = document.getElementById('sideBtnLeft');
            const sideRight = document.getElementById('sideBtnRight');
            const sideJumpL = document.getElementById('sideBtnJumpLeft');
            const sideJumpR = document.getElementById('sideBtnJumpRight');
            
            bind(sideLeft, () => { setKey('ArrowLeft', true); setKey('KeyA', true); }, () => { setKey('ArrowLeft', false); setKey('KeyA', false); });
            bind(sideRight, () => { setKey('ArrowRight', true); setKey('KeyD', true); }, () => { setKey('ArrowRight', false); setKey('KeyD', false); });
            bind(sideJumpL, () => { setKey('Space', true); setKey('ArrowUp', true); setKey('KeyW', true); }, () => { setKey('Space', false); setKey('ArrowUp', false); setKey('KeyW', false); });
            bind(sideJumpR, () => { setKey('Space', true); setKey('ArrowUp', true); setKey('KeyW', true); }, () => { setKey('Space', false); setKey('ArrowUp', false); setKey('KeyW', false); });
        }
        
        document.getElementById('pauseButton').addEventListener('click', () => { if(gameRunning) setPaused(!paused); });
        document.getElementById('restartButton').addEventListener('click', () => { resetGame(); gameRunning = true; if(paused) setPaused(false); });
        
        function init() {
            initControls();
            resetGame();
            gameLoop();
        }
        init();
    })();
</script>
</body>
</html>
